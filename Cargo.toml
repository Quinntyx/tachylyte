[package]
name = "tachylyte-workflows"
version = "0.1.0"
edition = "2021"
description = "Pure planners for Obsidian-compatible core workflows"
license = "MIT OR Apache-2.0"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[lints.rust]
warnings = "deny"
